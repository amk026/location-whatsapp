<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact us on WhatsApp</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Are you in our service area?</h1>
      <div id="message">Checking your location...</div>
      <div id="whatsapp-button" style="display: none">
        <a id="whatsapp-link" href="#" target="_blank" class="whatsapp-btn"
          >Contact us on WhatsApp</a
        >
      </div>
    </div>

    <!-- Configuration injected by server -->
    <div
      id="config"
      data-centre-lat="{{CENTRE_LAT}}"
      data-centre-lon="{{CENTRE_LON}}"
      style="display: none"
    ></div>

    <script src="/js/main.js"></script>
  </body>
</html>
